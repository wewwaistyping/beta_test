<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0f0a"/>
      <stop offset="100%" stop-color="#060906"/>
    </linearGradient>
    <radialGradient id="fairy" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5aad6a" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#5aad6a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect fill="url(#bg)" width="400" height="300" rx="10"/>

  <!-- Fairy light particles — scattered, varying size and opacity -->
  <circle cx="52" cy="38" r="1.2" fill="#5aad6a" opacity="0.5"/>
  <circle cx="52" cy="38" r="4" fill="url(#fairy)" opacity="0.15"/>

  <circle cx="340" cy="55" r="0.8" fill="#5aad6a" opacity="0.35"/>
  <circle cx="340" cy="55" r="3" fill="url(#fairy)" opacity="0.1"/>

  <circle cx="78" cy="180" r="1" fill="#5aad6a" opacity="0.4"/>
  <circle cx="78" cy="180" r="3.5" fill="url(#fairy)" opacity="0.12"/>

  <circle cx="335" cy="200" r="1.1" fill="#5aad6a" opacity="0.45"/>
  <circle cx="335" cy="200" r="4" fill="url(#fairy)" opacity="0.13"/>

  <circle cx="130" cy="260" r="0.7" fill="#5aad6a" opacity="0.3"/>
  <circle cx="130" cy="260" r="2.5" fill="url(#fairy)" opacity="0.1"/>

  <circle cx="290" cy="270" r="0.9" fill="#5aad6a" opacity="0.35"/>
  <circle cx="290" cy="270" r="3" fill="url(#fairy)" opacity="0.1"/>

  <circle cx="365" cy="130" r="0.6" fill="#5aad6a" opacity="0.25"/>
  <circle cx="365" cy="130" r="2" fill="url(#fairy)" opacity="0.08"/>

  <circle cx="30" cy="110" r="0.8" fill="#5aad6a" opacity="0.3"/>
  <circle cx="30" cy="110" r="3" fill="url(#fairy)" opacity="0.1"/>

  <circle cx="185" cy="28" r="0.7" fill="#5aad6a" opacity="0.25"/>
  <circle cx="185" cy="28" r="2.5" fill="url(#fairy)" opacity="0.08"/>

  <circle cx="250" cy="278" r="0.9" fill="#5aad6a" opacity="0.3"/>
  <circle cx="250" cy="278" r="3" fill="url(#fairy)" opacity="0.1"/>

  <!-- Minimal broken leaf/image icon -->
  <g transform="translate(200, 100)" fill="none" stroke="#3a7a4a" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M-22,-22 L14,-22 L22,-14 L22,8" opacity="0.7"/>
    <path d="M22,16 L22,22 L-6,22" opacity="0.7"/>
    <path d="M-14,22 L-22,22 L-22,-22" opacity="0.7"/>
    <path d="M-4,6 C-4,-8 8,-14 14,-14 C14,-14 12,-2 4,6 C2,8 -2,8 -4,6Z" opacity="0.45" fill="#2d5a3a" stroke="none"/>
    <path d="M-4,6 C-4,-8 8,-14 14,-14" opacity="0.5"/>
    <line x1="5" y1="-4" x2="-1" y2="4" opacity="0.35"/>
  </g>

  <!-- Text -->
  <text x="200" y="165" text-anchor="middle" fill="#4a8a5a" font-size="14" font-family="'Segoe UI', system-ui, sans-serif" font-weight="600" letter-spacing="0.5">Generation failed</text>
  <text x="200" y="186" text-anchor="middle" fill="#2a4a32" font-size="11" font-family="'Segoe UI', system-ui, sans-serif" letter-spacing="0.3">Regenerate from message menu</text>

  <!-- Thin accent line -->
  <line x1="175" y1="210" x2="225" y2="210" stroke="#2d5a3a" stroke-width="1" opacity="0.35"/>


</svg>
